<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin 🍹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0b0907;
      --surface:    #171210;
      --surface-2:  #201810;
      --gold:       #c9a44a;
      --gold-light: #e8c870;
      --cream:      #f0e6cc;
      --cream-dim:  rgba(240,230,204,.55);
      --rose:       #c0455f;
      --green:      #4caf82;
      --muted:      #6a5a48;
    }

    html, body {
      min-height: 100%; background: var(--bg);
      color: var(--cream); font-family: 'Cormorant Garamond', serif;
    }

    body {
      background-image:
        radial-gradient(ellipse 70% 40% at 20% 80%, rgba(120,25,45,.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 30% at 80% 20%, rgba(201,164,74,.05) 0%, transparent 50%);
      background-attachment: fixed;
    }

    /* ── Noise ── */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .page { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 2.5rem 1.2rem 4rem; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 2rem; }
    .header-eyebrow {
      font-size: .75rem; letter-spacing: .35em; text-transform: uppercase;
      color: var(--gold); opacity: .7; margin-bottom: .8rem;
    }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem); font-weight: 400;
    }
    .header-title em { font-style: italic; color: var(--gold-light); }

    .divider {
      display: flex; align-items: center; gap: 1rem; margin: 1.2rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,164,74,.3), transparent);
    }
    .divider-gem { color: var(--gold); font-size: .75rem; opacity: .6; }

    /* ── Status card ── */
    .status-card {
      background: var(--surface);
      border: 1px solid rgba(201,164,74,.14);
      border-radius: 2px; padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      position: relative; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    .status-card::before, .status-card::after {
      content: ''; position: absolute;
      width: 28px; height: 28px;
      border-style: solid; opacity: .3; border-color: var(--gold);
    }
    .status-card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .status-card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    .status-label {
      font-size: .72rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); margin-bottom: .5rem;
    }
    .status-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 4vw, 1.9rem); font-weight: 400;
      line-height: 1.2;
    }
    .status-text.waiting  { color: var(--cream-dim); }
    .status-text.opened   { color: var(--gold-light); }
    .status-text.yes      { color: var(--green); }
    .status-text.confirmed { color: var(--green); }

    .status-meta {
      font-size: .88rem; color: var(--muted); margin-top: .4rem;
      font-style: italic;
    }

    /* ── Refresh bar ── */
    .refresh-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .refresh-info {
      font-size: .78rem; color: var(--muted); letter-spacing: .05em;
    }
    .refresh-info span { color: var(--gold); opacity: .8; }
    .btn-refresh {
      font-family: 'Cormorant Garamond', serif;
      font-size: .85rem; letter-spacing: .1em;
      padding: .35rem 1rem; border: 1px solid rgba(201,164,74,.25);
      background: transparent; color: var(--gold); border-radius: 1px;
      cursor: pointer; transition: all .25s ease;
    }
    .btn-refresh:hover { background: rgba(201,164,74,.08); border-color: var(--gold); }

    .btn-reset {
      font-family: 'Cormorant Garamond', serif;
      font-size: .85rem; letter-spacing: .1em;
      padding: .35rem 1rem; border: 1px solid rgba(192,69,96,.35);
      background: transparent; color: var(--rose); border-radius: 1px;
      cursor: pointer; transition: all .25s ease;
    }
    .btn-reset:hover { background: rgba(192,69,96,.1); border-color: var(--rose); }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; gap: .6rem; }

    .event-row {
      display: flex; align-items: flex-start; gap: 1rem;
      background: var(--surface); border: 1px solid rgba(201,164,74,.08);
      border-radius: 1px; padding: .9rem 1.1rem;
      animation: row-in .4s ease both;
    }
    @keyframes row-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .event-icon { font-size: 1.3rem; flex-shrink: 0; line-height: 1; margin-top: .05rem; }

    .event-body { flex: 1; min-width: 0; }
    .event-title { font-size: 1rem; line-height: 1.3; }
    .event-title strong { font-weight: 600; }
    .event-detail { font-size: .83rem; color: var(--muted); margin-top: .15rem; font-style: italic; }
    .event-time {
      font-size: .75rem; color: var(--muted); white-space: nowrap;
      flex-shrink: 0; margin-top: .15rem; letter-spacing: .02em;
    }

    /* event type colours */
    .ev-page_open    .event-title { color: var(--cream-dim); }
    .ev-no_attempt   .event-title { color: var(--rose); }
    .ev-clicked_yes  .event-title { color: var(--green); }
    .ev-slot_selected .event-title { color: var(--gold-light); }
    .ev-confirmed    .event-title { color: var(--green); }

    /* ── Empty / error states ── */
    .state-box {
      background: var(--surface); border: 1px solid rgba(201,164,74,.08);
      border-radius: 1px; padding: 2.5rem 1.5rem; text-align: center;
      color: var(--cream-dim); font-style: italic; font-size: 1rem;
    }
    .state-box .icon { font-size: 2.2rem; display: block; margin-bottom: .7rem; }

    /* ── Auth error ── */
    .auth-error {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .auth-error-inner { padding: 2rem; }
    .auth-error-inner .icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
    .auth-error-inner p { font-size: 1.05rem; color: var(--cream-dim); font-style: italic; }

    /* ── Countdown ── */
    #countdown { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

<div id="app">
  <!-- content injected by JS -->
</div>

<script>
const KEY    = new URLSearchParams(location.search).get('key') || '';
const RELOAD = 15; // sekundi

const EVENT_META = {
  page_open:    { icon: '👀', label: 'Otvorila link'            },
  no_attempt:   { icon: '🙅', label: 'Pokušala kliknuti "Ne"'  },
  clicked_yes:  { icon: '✨', label: 'Kliknula DA!'             },
  slot_selected:{ icon: '📅', label: 'Odabrala termin'          },
  confirmed:    { icon: '🎉', label: 'POTVRDILA termin!'        },
  back_swipe:   { icon: '🏃', label: 'Pokušala pobjeći'         },
  left_page:    { icon: '👋', label: 'Napustila stranicu'       },
};

// ── Auth check ──
if (!KEY) {
  document.getElementById('app').innerHTML = `
    <div class="auth-error">
      <div class="auth-error-inner">
        <span class="icon">🔒</span>
        <p>Nedostaje tajni ključ.<br>
           Otvori stranicu s <em>?key=tvoja-tajna-rijec</em></p>
      </div>
    </div>`;
  throw new Error('No key');
}

// ── Helpers ──
function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleString('hr-HR', {
    day: '2-digit', month: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('hr-HR', { hour: '2-digit', minute: '2-digit' });
}

function deriveStatus(events) {
  const confirmed    = events.findLast(e => e.type === 'confirmed');
  const clickedYes   = events.findLast(e => e.type === 'clicked_yes');
  const opened       = events.find(e => e.type === 'page_open');
  const noCount      = events.filter(e => e.type === 'no_attempt').length;

  if (confirmed) return {
    cls: 'confirmed',
    text: `🎉 Potvrdila! ${confirmed.data?.day}, ${confirmed.data?.date} u ${confirmed.data?.time}`,
    meta: `Potvrdila u ${fmtTime(confirmed.created_at)}`,
  };
  if (clickedYes) return {
    cls: 'yes',
    text: '✨ Rekla DA! Bira termin...',
    meta: `Kliknula Da u ${fmtTime(clickedYes.created_at)}`,
  };
  if (opened && noCount > 0) return {
    cls: 'opened',
    text: `👀 Otvorila i pokušala ${noCount}× kliknuti "Ne"`,
    meta: `Otvorila u ${fmtTime(opened.created_at)}`,
  };
  if (opened) return {
    cls: 'opened',
    text: '👀 Otvorila link — čeka na odluku',
    meta: `Otvorila u ${fmtTime(opened.created_at)}`,
  };
  return { cls: 'waiting', text: 'Još nije otvorila link...', meta: null };
}

function eventDetail(ev) {
  switch (ev.type) {
    case 'no_attempt':
      return `${ev.data?.attempt}. pokušaj`;
    case 'slot_selected':
    case 'confirmed':
      return ev.data
        ? `${ev.data.day}, ${ev.data.date} u ${ev.data.time} — ${ev.data.label}`
        : null;
    default:
      return null;
  }
}

// ── Render ──
function render(events) {
  const status = deriveStatus(events);

  const timelineHtml = events.length === 0
    ? `<div class="state-box"><span class="icon">🕰</span>Nema evenata još. Pošalji joj link!</div>`
    : events.map((ev, i) => {
        const meta = EVENT_META[ev.type] ?? { icon: '•', label: ev.type };
        const detail = eventDetail(ev);
        return `
          <div class="event-row ev-${ev.type}" style="animation-delay:${i * 0.04}s">
            <div class="event-icon">${meta.icon}</div>
            <div class="event-body">
              <div class="event-title"><strong>${meta.label}</strong></div>
              ${detail ? `<div class="event-detail">${detail}</div>` : ''}
            </div>
            <div class="event-time">${fmt(ev.created_at)}</div>
          </div>`;
      }).join('');

  document.getElementById('app').innerHTML = `
    <div class="page">
      <div class="header">
        <p class="header-eyebrow">🍹 kafica tracker</p>
        <h1 class="header-title"><em>Što se</em> događa?</h1>
        <div class="divider"><span class="divider-gem">◆</span></div>
      </div>

      <div class="status-card">
        <p class="status-label">Trenutni status</p>
        <p class="status-text ${status.cls}">${status.text}</p>
        ${status.meta ? `<p class="status-meta">${status.meta}</p>` : ''}
      </div>

      <div class="refresh-row">
        <p class="refresh-info">
          Ukupno evenata: <span>${events.length}</span> &nbsp;·&nbsp;
          Auto-refresh za <span id="countdown">${RELOAD}s</span>
        </p>
        <button class="btn-refresh" onclick="loadEvents()">↻ Osvježi</button>
        <button class="btn-reset" onclick="resetEvents()">🗑 Reset</button>
      </div>

      <div class="timeline">${timelineHtml}</div>
    </div>`;

  startCountdown();
}

function renderError(code) {
  document.getElementById('app').innerHTML = `
    <div class="auth-error">
      <div class="auth-error-inner">
        <span class="icon">${code === 401 ? '🔒' : '⚠️'}</span>
        <p>${code === 401
          ? 'Pogrešan tajni ključ.'
          : 'Greška pri dohvaćanju podataka. Provjeri Supabase konfiguraciju.'
        }</p>
      </div>
    </div>`;
}

// ── Countdown ──
let countdownTimer = null;
function startCountdown() {
  clearInterval(countdownTimer);
  let secs = RELOAD;
  const el = () => document.getElementById('countdown');
  countdownTimer = setInterval(() => {
    secs--;
    if (el()) el().textContent = secs + 's';
    if (secs <= 0) { clearInterval(countdownTimer); loadEvents(); }
  }, 1000);
}

// ── Fetch events ──
async function loadEvents() {
  try {
    const res = await fetch(`/api/events?key=${encodeURIComponent(KEY)}`);
    if (!res.ok) { renderError(res.status); return; }
    const events = await res.json();
    render(events);
  } catch {
    renderError(0);
  }
}

async function resetEvents() {
  if (!confirm('Obriši sve evente?')) return;
  await fetch('/api/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: KEY }),
  });
  loadEvents();
}

loadEvents();
</script>
</body>
</html>
